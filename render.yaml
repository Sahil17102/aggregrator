services:
  - type: web
    name: aggregator-backend
    runtime: node
    rootDir: apps/backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: PGSSLMODE
        value: require
      - key: CORS_ORIGINS
        value: https://aggregator-client.onrender.com,https://aggregator-admin.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://aggregator-client.onrender.com,https://aggregator-admin.onrender.com
      - key: FRONTEND_URL
        value: https://aggregator-client.onrender.com
      - key: ADMIN_URL
        value: https://aggregator-admin.onrender.com
      - key: API_URL
        value: https://aggregator-backend-7gmk.onrender.com
      - key: EXPOSE_AUTH_CODES
        sync: false
      - key: ALLOW_INLINE_OTP
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: ACCESS_TOKEN_EXPIRY
        value: 30m
      - key: REFRESH_TOKEN_EXPIRY
        value: 7d
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: GOOGLE_SMTP_USER
        sync: false
      - key: GOOGLE_SMTP_PASSWORD
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILLIO_SENDGRID_API_KEY
        sync: false
      - key: RAZORPAY_MODE
        value: test
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: DEV_BUCKET
        sync: false
      - key: STAGING_BUCKET
        sync: false

  - type: static
    name: aggregator-client
    rootDir: apps/client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://aggregator-backend-7gmk.onrender.com/api
      - key: VITE_APP_SOCKET_URL
        value: https://aggregator-backend-7gmk.onrender.com
      - key: VITE_PUBLIC_GEOAPIFY_KEY
        sync: false
      - key: VITE_GOOGLE_OAUTH_CLIENT_ID
        sync: false

  - type: static
    name: aggregator-admin
    rootDir: apps/admin
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NPM_FLAGS
        value: --legacy-peer-deps
      - key: REACT_APP_API_BASE_URL
        value: https://aggregator-backend-7gmk.onrender.com/api
      - key: REACT_APP_SOCKET_URL
        value: https://aggregator-backend-7gmk.onrender.com
